name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC for x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build x64 binaries
        shell: cmd
        run: |
          cd CPP\7zip
          nmake

      - name: Setup MSVC for x86 shell extension
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_x86

      - name: Build x86 shell extension
        shell: cmd
        run: |
          cd CPP\7zip\UI\Explorer
          nmake PLATFORM=x86

      - name: Install WiX Toolset
        shell: powershell
        run: |
          $wixDir = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset v3*' |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $wixDir) {
            choco install wixtoolset --no-progress -y
            $wixDir = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset v3*' |
              Sort-Object Name -Descending |
              Select-Object -First 1
          }
          if (-not $wixDir) {
            throw 'WiX Toolset v3 was not found after installation.'
          }
          (Join-Path $wixDir.FullName 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package release assets
        shell: powershell
        run: .\scripts\Package-Release.ps1 -Version '${{ github.ref_name }}' -BuildMsi

      - name: Smoke test packaged binaries
        shell: powershell
        run: .\scripts\Smoke-Test.ps1 -PortableRoot (Join-Path $PWD 'artifacts\stage\7zip-bzip3-x64')

      - name: Smoke test MSI install
        shell: powershell
        run: |
          $msi = Get-ChildItem artifacts -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            throw 'MSI artifact not found.'
          }

          $log = Join-Path $PWD 'artifacts\msi-install.log'
          $installArgs = @('/i', $msi.FullName, '/qn', '/norestart', '/l*v', $log)
          $proc = Start-Process -FilePath msiexec.exe -ArgumentList $installArgs -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            throw "MSI install failed with exit code $($proc.ExitCode). See $log"
          }

          $installDir = Join-Path $env:ProgramFiles '7-Zip BZip3'
          $exe = Join-Path $installDir '7z.exe'
          $gui = Join-Path $installDir '7zFM.exe'

          foreach ($path in @(
            $exe,
            $gui,
            (Join-Path $installDir '7z.dll'),
            (Join-Path $installDir '7-zip.dll'),
            (Join-Path $installDir '7-zip32.dll')
          )) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Installed file missing: $path"
            }
          }

          $appPathTarget = Join-Path $installDir '7zFM.exe'
          $appPaths64 = & reg query 'HKLM\Software\Microsoft\Windows\CurrentVersion\App Paths\7zFM.exe' /ve /reg:64
          $ok64 = ($LASTEXITCODE -eq 0) -and ($appPaths64 -match [regex]::Escape($appPathTarget))
          $appPaths32 = & reg query 'HKLM\Software\Microsoft\Windows\CurrentVersion\App Paths\7zFM.exe' /ve /reg:32
          $ok32 = ($LASTEXITCODE -eq 0) -and ($appPaths32 -match [regex]::Escape($appPathTarget))
          if (-not ($ok64 -or $ok32)) {
            Write-Host 'App Paths 64-bit view:'
            Write-Host ($appPaths64 -join "`n")
            Write-Host 'App Paths 32-bit view:'
            Write-Host ($appPaths32 -join "`n")
            throw 'App Paths registration missing or wrong.'
          }
          Write-Host ("App Paths view: {0}" -f ($(if ($ok64) { '64-bit' } else { '32-bit' })))

          $shellExtPath = 'Registry::HKEY_CLASSES_ROOT\*\shellex\ContextMenuHandlers\7-Zip BZip3'
          if (-not (Test-Path -LiteralPath $shellExtPath)) {
            throw 'Context menu handler registration missing or wrong.'
          }
          $shellExtValue = (Get-Item -LiteralPath $shellExtPath).GetValue('')
          if ($shellExtValue -ne '{4C6B8933-560A-437F-B358-C4B0FCA654EF}') {
            Write-Host "Context menu handler value: $shellExtValue"
            throw 'Context menu handler registration missing or wrong.'
          }

          $work = Join-Path $env:TEMP ('7zip-bzip3-msi-' + [guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          try {
            Push-Location $work
            'alpha bravo charlie' | Set-Content -LiteralPath 'sample.txt' -Encoding ascii

            & $exe i | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed 7z.exe i failed.'
            }

            & $exe a sample.bz3 sample.txt -tbzip3 -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed bzip3 archive creation failed.'
            }

            & $exe x sample.bz3 -oout-bz3 -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed bzip3 extraction failed.'
            }

            & $exe a sample.7z sample.txt -t7z -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed 7z archive creation failed.'
            }

            & $exe x sample.7z -oout-7z -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed 7z extraction failed.'
            }

            & $exe a sample.tar sample.txt -ttar -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed tar archive creation failed.'
            }

            Copy-Item -LiteralPath 'sample.tar' -Destination 'payload.bin'

            & $exe a sample.tar.bz3 payload.bin -tbzip3 -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed tar.bz3 archive creation failed.'
            }

            & $exe x sample.tar.bz3 -oout-tarbz3 -y | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw 'Installed tar.bz3 extraction failed.'
            }

            if ((Get-Content -LiteralPath 'out-bz3\sample' -Raw) -ne "alpha bravo charlie`r`n") {
              throw 'Installed bzip3 extraction content mismatch.'
            }

            if ((Get-Content -LiteralPath 'out-7z\sample.txt' -Raw) -ne "alpha bravo charlie`r`n") {
              throw 'Installed 7z extraction content mismatch.'
            }

            if ((Get-Content -LiteralPath 'out-tarbz3\sample.txt' -Raw) -ne "alpha bravo charlie`r`n") {
              throw 'Installed tar.bz3 extraction content mismatch.'
            }

            if (Test-Path -LiteralPath 'out-tarbz3\sample.tar') {
              throw 'Installed tar.bz3 extraction left tar wrapper behind.'
            }
          }
          finally {
            Pop-Location
            Remove-Item -LiteralPath $work -Recurse -Force -ErrorAction SilentlyContinue
          }

          $p = Start-Process -FilePath $gui -PassThru
          Start-Sleep -Seconds 2
          if ($p.HasExited) {
            throw 'Installed GUI exited too fast.'
          }
          Stop-Process -Id $p.Id -Force

          & reg query 'HKLM\Software\7-Zip BZip3' /s | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw 'Installed fork registry key missing.'
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-bzip3-release
          path: |
            artifacts/*.zip
            artifacts/*.msi
            artifacts/SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.msi
            artifacts/SHA256SUMS.txt
