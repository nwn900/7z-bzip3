name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC for x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build x64 binaries
        shell: cmd
        run: |
          cd CPP\7zip
          nmake

      - name: Setup MSVC for x86 shell extension
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_x86

      - name: Build x86 shell extension
        shell: cmd
        run: |
          cd CPP\7zip\UI\Explorer
          nmake PLATFORM=x86

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset --version=3.11.2 --no-progress -y
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package release assets
        shell: powershell
        run: .\scripts\Package-Release.ps1 -Version '${{ github.ref_name }}' -BuildMsi

      - name: Smoke test packaged binaries
        shell: powershell
        run: .\scripts\Smoke-Test.ps1 -PortableRoot (Join-Path $PWD 'artifacts\stage\7zip-bzip3-x64')

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 7zip-bzip3-release
          path: |
            artifacts/*.zip
            artifacts/*.msi
            artifacts/SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.msi
            artifacts/SHA256SUMS.txt
